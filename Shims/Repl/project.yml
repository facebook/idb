name: Repl

options:
  createIntermediateGroups: true

targets:
  # DYLD-injected REPL shims (libRepl-iOS / libRepl-macOS).
  Repl-iOS:
    type: library.dynamic
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: .
        excludes:
          - "**/*.xcodeproj"
          - "project.yml"
          - "Build"
      - path: ../../REPL/Executor
    preBuildScripts:
      - name: Stage ReplExecutor headers
        # TestRepl.m imports <ReplExecutor/ReplSocketServer.h>. The headers live
        # in REPL/Executor; stage them under a `ReplExecutor` directory on
        # HEADER_SEARCH_PATHS so the angle-bracket import resolves.
        script: |
          set -e
          DEST="$TARGET_TEMP_DIR/ReplExecutorHeaders/ReplExecutor"
          mkdir -p "$DEST"
          cp "$SRCROOT/../../REPL/Executor/"*.h "$DEST/"
    settings:
      base:
        SDKROOT: iphonesimulator
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        PRODUCT_NAME: Repl-iOS
        EXECUTABLE_PREFIX: lib
        CURRENT_PROJECT_VERSION: 1
        DYLIB_CURRENT_VERSION: 1
        DYLIB_COMPATIBILITY_VERSION: 1
        COPY_PHASE_STRIP: NO
        CODE_SIGN_IDENTITY: "-"
        CLANG_ENABLE_OBJC_ARC: NO
        HEADER_SEARCH_PATHS: $(inherited) $(TARGET_TEMP_DIR)/ReplExecutorHeaders
        GCC_PREPROCESSOR_DEFINITIONS: $(inherited) SENTEST_IGNORE_DEPRECATION_WARNING=1
        OTHER_CFLAGS: $(inherited) -Wno-deprecated-declarations
        # TestRepl subclasses XCTestCase (forward-declared in XCTestPrivate.h, not
        # linked). The class is provided by the xctest host this dylib is injected
        # into, so defer the XCTestCase superclass symbol to runtime resolution.
        OTHER_LDFLAGS: $(inherited) -undefined dynamic_lookup
    dependencies:
      - sdk: Foundation.framework

  Repl-macOS:
    type: library.dynamic
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: .
        excludes:
          - "**/*.xcodeproj"
          - "project.yml"
          - "Build"
      - path: ../../REPL/Executor
    preBuildScripts:
      - name: Stage ReplExecutor headers
        # See Repl-iOS above.
        script: |
          set -e
          DEST="$TARGET_TEMP_DIR/ReplExecutorHeaders/ReplExecutor"
          mkdir -p "$DEST"
          cp "$SRCROOT/../../REPL/Executor/"*.h "$DEST/"
    settings:
      base:
        SDKROOT: macosx
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        PRODUCT_NAME: Repl-macOS
        EXECUTABLE_PREFIX: lib
        CURRENT_PROJECT_VERSION: 1
        DYLIB_CURRENT_VERSION: 1
        DYLIB_COMPATIBILITY_VERSION: 1
        COPY_PHASE_STRIP: NO
        CODE_SIGN_IDENTITY: "-"
        CLANG_ENABLE_OBJC_ARC: NO
        HEADER_SEARCH_PATHS: $(inherited) $(TARGET_TEMP_DIR)/ReplExecutorHeaders
        GCC_PREPROCESSOR_DEFINITIONS: $(inherited) SENTEST_IGNORE_DEPRECATION_WARNING=1
        OTHER_CFLAGS: $(inherited) -Wno-deprecated-declarations
        # See Repl-iOS: XCTestCase is provided by the injected xctest host.
        OTHER_LDFLAGS: $(inherited) -undefined dynamic_lookup
    dependencies:
      - sdk: Foundation.framework
